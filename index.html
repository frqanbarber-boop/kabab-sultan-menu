<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطعم كباب السلطان | المنيو الإلكتروني</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma,Arial,sans-serif}
body{background:#f5f1ea;color:#222;padding-bottom:90px}
header{background:linear-gradient(135deg,#7a0000,#b00000);color:white;text-align:center;padding:30px 15px}
header h1{font-size:34px;margin-bottom:10px}
header p{font-size:17px}
.container{max-width:950px;margin:auto;padding:18px}
.brand-logo-wrap{text-align:center;margin-bottom:14px}
.brand-logo{width:100%;max-width:180px;height:auto;display:block;margin:auto;border-radius:14px;object-fit:contain}
.hero-wrap{margin-bottom:18px}
.hero-image{width:100%;height:260px;border-radius:18px;object-fit:cover;display:block}
.notice{background:#fff3cd;border-radius:14px;padding:15px;margin:18px 0;font-size:17px;text-align:center}
.category{font-size:26px;color:#8b0000;margin:25px 0 15px;border-right:6px solid #8b0000;padding-right:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}
.card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.12)}
.card img{width:100%;height:180px;object-fit:cover}
.info{padding:16px}
.info h2{font-size:21px;margin-bottom:8px}
.price{color:#b00000;font-size:22px;font-weight:bold;margin-bottom:12px}
.controls{display:flex;align-items:center;gap:10px}
.controls button{width:42px;height:42px;border:none;border-radius:50%;background:#8b0000;color:white;font-size:24px}
.qty{font-size:22px;font-weight:bold;min-width:30px;text-align:center}
.cart{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #ddd;padding:12px 15px;box-shadow:0 -5px 18px rgba(0,0,0,.15)}
.cart-inner{max-width:950px;margin:auto;display:flex;gap:10px;align-items:center;justify-content:space-between}
.total{font-size:20px;font-weight:bold;color:#8b0000}
.order-btn{background:#25D366;color:white;border:none;border-radius:12px;padding:14px 18px;font-size:17px;font-weight:bold}
.form-box{background:white;border-radius:18px;padding:18px;margin-top:25px;box-shadow:0 8px 22px rgba(0,0,0,.1)}
input,textarea{width:100%;padding:14px;margin-top:10px;border:1px solid #ddd;border-radius:12px;font-size:16px}
footer{background:#222;color:white;text-align:center;padding:25px;line-height:2;margin-top:35px}
@media (max-width:640px){
  .brand-logo{max-width:140px}
  .hero-image{height:190px}
}
</style>
</head>

<body>

<header>
<h1>مطعم كباب السلطان</h1>
<p>كباب مشوي على الفحم • توصيل النجف والكوفة</p>
</header>

<div class="container">

<div class="brand-logo-wrap">
<img class="brand-logo" src="images/logo.png" alt="شعار مطعم كباب السلطان" onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"420\" height=\"180\" viewBox=\"0 0 420 180\"><rect width=\"100%25\" height=\"100%25\" rx=\"24\" fill=\"%23f1ece3\"/><text x=\"50%25\" y=\"50%25\" dominant-baseline=\"middle\" text-anchor=\"middle\" font-family=\"Tahoma,Arial,sans-serif\" font-size=\"28\" fill=\"%238b0000\">شعار المطعم</text></svg>';">
</div>

<div class="hero-wrap">
<img class="hero-image" src="images/hero.jpg" alt="واجهة مطعم كباب السلطان" onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"1200\" height=\"520\" viewBox=\"0 0 1200 520\"><rect width=\"100%25\" height=\"100%25\" rx=\"24\" fill=\"%23efe7db\"/><text x=\"50%25\" y=\"50%25\" dominant-baseline=\"middle\" text-anchor=\"middle\" font-family=\"Tahoma,Arial,sans-serif\" font-size=\"52\" fill=\"%238b0000\">صورة الغلاف</text></svg>';">
</div>

<div class="notice">
🚚 التوصيل متوفر لكافة مناطق النجف والكوفة
</div>

<h2 class="category">🔥 قائمة الكباب</h2>

<div class="grid" id="menu"></div>

<div class="form-box">
<h2>معلومات الطلب</h2>
<button id="locationBtn" type="button" onclick="getLocation()" style="width:100%;padding:14px;margin-top:10px;background:#0d6efd;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:bold;">
📍 إرسال موقعي
</button>
<textarea id="notes" placeholder="ملاحظات الطلب مثل: بدون بصل، زيادة خبز..." rows="3"></textarea>
</div>

</div>

<footer>
<h2>مطعم كباب السلطان</h2>
<p>📍 الكوفة - قرب مجمع المختار السكني</p>
<p>📞 07845223345</p>
<p>🚚 التوصيل متوفر لكافة مناطق النجف والكوفة</p>
</footer>

<div class="cart">
<div class="cart-inner">
<div class="total">المجموع: <span id="total">0</span> د.ع</div>
<button class="order-btn" onclick="sendOrder()">إرسال الطلب واتساب</button>
</div>
</div>

<script>
const phone = "9647845223345";
let customerLocation = "";

const items = [
  {
    name: "كيلو كباب لحم",
    price: 16000,
    image: "images/beef.jpg"
  },
  {
    name: "كيلو كباب دجاج",
    price: 14000,
    image: "images/chicken.jpg"
  },
  {
    name: "نصف كيلو كباب لحم",
    price: 8000,
    image: "images/beef.jpg"
  },
  {
    name: "نصف كيلو كباب دجاج",
    price: 7000,
    image: "images/chicken.jpg"
  }
];

let cart = {};

function renderMenu(){
  const menu = document.getElementById("menu");
  menu.innerHTML = "";
  items.forEach((item, index)=>{
    cart[index] = cart[index] || 0;
    menu.innerHTML += `
      <div class="card">
        <img src="${item.image}" alt="${item.name}" loading="lazy" onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"800\" height=\"500\" viewBox=\"0 0 800 500\"><rect width=\"100%25\" height=\"100%25\" rx=\"20\" fill=\"%23f1ece3\"/><text x=\"50%25\" y=\"50%25\" dominant-baseline=\"middle\" text-anchor=\"middle\" font-family=\"Tahoma,Arial,sans-serif\" font-size=\"38\" fill=\"%238b0000\">صورة غير متوفرة</text></svg>';">
        <div class="info">
          <h2>${item.name}</h2>
          <div class="price">${item.price.toLocaleString()} د.ع</div>
          <div class="controls">
            <button onclick="changeQty(${index},1)">+</button>
            <div class="qty" id="qty-${index}">${cart[index]}</div>
            <button onclick="changeQty(${index},-1)">−</button>
          </div>
        </div>
      </div>
    `;
  });
}

function changeQty(index, amount){
  cart[index] = Math.max(0, cart[index] + amount);
  document.getElementById("qty-" + index).innerText = cart[index];
  updateTotal();
}

function updateTotal(){
  let total = 0;
  items.forEach((item,index)=>{
    total += item.price * cart[index];
  });
  document.getElementById("total").innerText = total.toLocaleString();
}

function getLocation(){
  if(!navigator.geolocation){
    alert("المتصفح لا يدعم تحديد الموقع");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      customerLocation = `https://maps.google.com/?q=${lat},${lng}`;
      const locationBtn = document.getElementById("locationBtn");
      locationBtn.innerText = "✅ تم تحديد الموقع";
      locationBtn.style.background = "#198754";
    },
    () => {
      alert("تعذر تحديد الموقع، يرجى المحاولة مرة أخرى");
    }
  );
}

function sendOrder(){
  let orderText = "مطعم كباب السلطان%0A%0A";
  orderText += "الأصناف المختارة:%0A";
  let total = 0;
  let hasItems = false;

  items.forEach((item,index)=>{
    if(cart[index] > 0){
      hasItems = true;
      let subtotal = item.price * cart[index];
      total += subtotal;
      orderText += `- ${item.name}: الكمية ${cart[index]} | سعر الصنف ${item.price.toLocaleString()} د.ع | الإجمالي ${subtotal.toLocaleString()} د.ع%0A`;
    }
  });

  if(!hasItems){
    alert("اختر صنف واحد على الأقل");
    return;
  }

  if(!customerLocation){
    alert("يرجى إرسال موقعك أولاً");
    return;
  }

  const notes = document.getElementById("notes").value;

  orderText += `%0Aالمجموع الكلي: ${total.toLocaleString()} د.ع`;
  if(notes.trim()){
    orderText += `%0Aالملاحظات: ${notes.trim()}`;
  }
  orderText += `%0Aرابط الموقع على Google Maps: ${customerLocation}`;
  orderText += `%0A%0Aالتوصيل متوفر لكافة مناطق النجف والكوفة`;

  window.location.href = `https://wa.me/${phone}?text=${orderText}`;
}

renderMenu();
updateTotal();
</script>

</body>
</html>
