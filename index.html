<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطعم كباب السلطان | المنيو الإلكتروني</title>

<style>
:root{
  --bg:#f7f3ec;
  --surface:#ffffff;
  --surface-soft:#fcfaf7;
  --text:#1f1a17;
  --muted:#6f6760;
  --red:#7b0d12;
  --red-2:#a4171d;
  --gold:#d6b56c;
  --border:rgba(123,13,18,.10);
  --shadow:0 14px 34px rgba(37,24,18,.08);
  --shadow-soft:0 10px 24px rgba(37,24,18,.06);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma,Arial,sans-serif}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(circle at top, rgba(214,181,108,.14), transparent 34%),
    linear-gradient(180deg,#fff 0%,var(--bg) 100%);
  color:var(--text);
  padding-bottom:108px;
}
header{
  background:linear-gradient(135deg,var(--red),#5d090d 60%,#8a1a18);
  color:white;
  text-align:center;
  padding:20px 16px 18px;
  box-shadow:0 10px 28px rgba(123,13,18,.16);
}
header h1{font-size:34px;letter-spacing:.2px;margin-bottom:8px}
header p{font-size:16px;color:rgba(255,255,255,.88)}
.container{max-width:980px;margin:auto;padding:16px 14px 18px}
.brand-logo-wrap{text-align:center;margin:6px auto 12px}
.brand-logo{
  width:min(160px,42vw);
  height:auto;
  display:block;
  margin:auto;
  border-radius:18px;
  object-fit:contain;
  filter:drop-shadow(0 8px 18px rgba(37,24,18,.12));
}
.hero-wrap{margin-bottom:16px}
.hero-image{
  width:100%;
  height:clamp(170px,30vw,260px);
  border-radius:24px;
  object-fit:cover;
  object-position:center top;
  display:block;
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,.6);
}
.notice{
  background:linear-gradient(180deg,#fff9e7 0%,#fff5d6 100%);
  border:1px solid rgba(214,181,108,.35);
  border-radius:20px;
  padding:14px 16px;
  margin:10px 0 18px;
  font-size:16px;
  text-align:center;
  box-shadow:var(--shadow-soft);
}
.category{
  font-size:24px;
  color:var(--red);
  margin:20px 0 14px;
  border-right:6px solid var(--gold);
  padding-right:12px;
  line-height:1.2;
}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.card{
  background:linear-gradient(180deg,#fff 0%,#fffdfa 100%);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  transition:transform .18s ease, box-shadow .18s ease;
}
.card:hover{transform:translateY(-2px);box-shadow:0 16px 28px rgba(37,24,18,.10)}
.card img{
  width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  display:block;
  background:#f3ede4;
}
.info{padding:16px 16px 18px}
.info h2{
  font-size:21px;
  margin-bottom:8px;
  color:var(--text);
  line-height:1.4;
}
.price{
  color:var(--red-2);
  font-size:22px;
  font-weight:700;
  margin-bottom:14px;
}
.controls{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding-top:4px;
}
.controls button{
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  background:linear-gradient(180deg,var(--red-2),var(--red));
  color:white;
  font-size:24px;
  line-height:1;
  box-shadow:0 8px 16px rgba(123,13,18,.18);
  transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
}
.controls button:active{transform:scale(.92);filter:saturate(1.06);box-shadow:0 5px 10px rgba(123,13,18,.14)}
.qty{
  font-size:22px;
  font-weight:700;
  min-width:34px;
  text-align:center;
  color:var(--text);
  transition:transform .12s ease;
}
.form-box{
  background:linear-gradient(180deg,#fff 0%,#fffcf8 100%);
  border-radius:24px;
  padding:18px;
  margin-top:22px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
}
.form-box h2{
  font-size:22px;
  margin-bottom:6px;
  color:var(--text);
}
input,textarea{
  width:100%;
  padding:14px 15px;
  margin-top:10px;
  border:1px solid rgba(123,13,18,.12);
  border-radius:16px;
  font-size:16px;
  background:#fff;
  outline:none;
  transition:border-color .15s ease, box-shadow .15s ease;
}
input:focus,textarea:focus{border-color:rgba(123,13,18,.34);box-shadow:0 0 0 4px rgba(214,181,108,.16)}
#locationBtn{
  width:100%;
  padding:14px;
  margin-top:10px;
  background:linear-gradient(135deg,#1c7c54,#1f8e5b);
  color:#fff;
  border:none;
  border-radius:16px;
  font-size:17px;
  font-weight:700;
  box-shadow:0 10px 18px rgba(28,124,84,.16);
  transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
}
#locationBtn:active{transform:scale(.99);filter:brightness(.98)}
.cart{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(123,13,18,.08);
  padding:12px 14px calc(12px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 24px rgba(37,24,18,.10);
}
.cart-inner{
  max-width:980px;
  margin:auto;
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
}
.total{
  font-size:18px;
  font-weight:700;
  color:var(--red);
  background:#fff;
  border:1px solid rgba(123,13,18,.08);
  border-radius:16px;
  padding:12px 14px;
  box-shadow:0 8px 20px rgba(37,24,18,.06);
  flex:1;
}
.order-btn{
  background:linear-gradient(135deg,#27b15e,#18a24e);
  color:white;
  border:none;
  border-radius:16px;
  padding:15px 18px;
  font-size:16px;
  font-weight:700;
  box-shadow:0 12px 20px rgba(24,162,78,.20);
  min-width:170px;
  transition:transform .12s ease, box-shadow .12s ease;
}
.order-btn:active{transform:scale(.98);box-shadow:0 8px 14px rgba(24,162,78,.16)}
footer{
  background:linear-gradient(180deg,#261919 0%,#1f1515 100%);
  color:white;
  text-align:center;
  padding:24px 18px;
  line-height:2;
  margin-top:34px;
}
footer h2{font-size:22px;margin-bottom:4px}
footer p{color:rgba(255,255,255,.9)}
@media (max-width:640px){
  body{padding-bottom:116px}
  header{padding:18px 14px 16px}
  header h1{font-size:28px}
  header p{font-size:14px}
  .container{padding:14px 12px 16px}
  .brand-logo{width:min(138px,42vw)}
  .hero-image{border-radius:22px}
  .grid{grid-template-columns:1fr;gap:14px}
  .card{border-radius:22px}
  .info{padding:15px}
  .controls button{width:42px;height:42px}
  .cart-inner{flex-direction:column;align-items:stretch}
  .order-btn{width:100%;min-width:0}
}
</style>
</head>

<body>

<header>
<h1>مطعم كباب السلطان</h1>
<p>كباب مشوي على الفحم • توصيل النجف والكوفة</p>
</header>

<div class="container">

<div class="brand-logo-wrap">
<img class="brand-logo" src="images/logo.png" alt="">
</div>

<div class="hero-wrap">
<img class="hero-image" src="images/hero.jpg" alt="">
</div>

<div class="notice">
🚚 التوصيل متوفر لكافة مناطق النجف والكوفة
</div>

<h2 class="category">🔥 قائمة الكباب</h2>

<div class="grid" id="menu"></div>

<div class="form-box">
<h2>معلومات الطلب</h2>
<button id="locationBtn" type="button" onclick="getLocation()" style="width:100%;padding:14px;margin-top:10px;background:#0d6efd;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:bold;">
📍 إرسال موقعي
</button>
<textarea id="notes" placeholder="ملاحظات الطلب مثل: بدون بصل، زيادة خبز..." rows="3"></textarea>
</div>

</div>

<footer>
<h2>مطعم كباب السلطان</h2>
<p>📍 الكوفة - قرب مجمع المختار السكني</p>
<p>📞 07845223345</p>
<p>🚚 التوصيل متوفر لكافة مناطق النجف والكوفة</p>
</footer>

<div class="cart">
<div class="cart-inner">
<div class="total">المجموع: <span id="total">0</span> د.ع</div>
<button class="order-btn" onclick="sendOrder()">إرسال الطلب واتساب</button>
</div>
</div>

<script>
const phone = "9647845223345";
let customerLocation = "";

const items = [
  {
    name: "كيلو كباب لحم",
    price: 16000,
    image: "images/beef.jpg"
  },
  {
    name: "كيلو كباب دجاج",
    price: 14000,
    image: "images/chicken.jpg"
  },
  {
    name: "نصف كيلو كباب لحم",
    price: 8000,
    image: "images/beef.jpg"
  },
  {
    name: "نصف كيلو كباب دجاج",
    price: 7000,
    image: "images/chicken.jpg"
  }
];

let cart = {};

function renderMenu(){
  const menu = document.getElementById("menu");
  menu.innerHTML = "";
  items.forEach((item, index)=>{
    cart[index] = cart[index] || 0;
    menu.innerHTML += `
      <div class="card">
        <img src="${item.image}" alt="" loading="lazy">
        <div class="info">
          <h2>${item.name}</h2>
          <div class="price">${item.price.toLocaleString()} د.ع</div>
          <div class="controls">
            <button onclick="changeQty(${index},1)">+</button>
            <div class="qty" id="qty-${index}">${cart[index]}</div>
            <button onclick="changeQty(${index},-1)">−</button>
          </div>
        </div>
      </div>
    `;
  });
}

function changeQty(index, amount){
  cart[index] = Math.max(0, cart[index] + amount);
  document.getElementById("qty-" + index).innerText = cart[index];
  updateTotal();
}

function updateTotal(){
  let total = 0;
  items.forEach((item,index)=>{
    total += item.price * cart[index];
  });
  document.getElementById("total").innerText = total.toLocaleString();
}

function getLocation(){
  if(!navigator.geolocation){
    alert("المتصفح لا يدعم تحديد الموقع");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      customerLocation = `https://maps.google.com/?q=${lat},${lng}`;
      const locationBtn = document.getElementById("locationBtn");
      locationBtn.innerText = "✅ تم تحديد الموقع";
      locationBtn.style.background = "#198754";
    },
    () => {
      alert("تعذر تحديد الموقع، يرجى المحاولة مرة أخرى");
    }
  );
}

function sendOrder(){
  let orderText = "مطعم كباب السلطان%0A%0A";
  orderText += "الأصناف المختارة:%0A";
  let total = 0;
  let hasItems = false;

  items.forEach((item,index)=>{
    if(cart[index] > 0){
      hasItems = true;
      let subtotal = item.price * cart[index];
      total += subtotal;
      orderText += `- ${item.name}: الكمية ${cart[index]} | سعر الصنف ${item.price.toLocaleString()} د.ع | الإجمالي ${subtotal.toLocaleString()} د.ع%0A`;
    }
  });

  if(!hasItems){
    alert("اختر صنف واحد على الأقل");
    return;
  }

  if(!customerLocation){
    alert("يرجى إرسال موقعك أولاً");
    return;
  }

  const notes = document.getElementById("notes").value;

  orderText += `%0Aالمجموع الكلي: ${total.toLocaleString()} د.ع`;
  if(notes.trim()){
    orderText += `%0Aالملاحظات: ${notes.trim()}`;
  }
  orderText += `%0Aرابط الموقع على Google Maps: ${customerLocation}`;
  orderText += `%0A%0Aالتوصيل متوفر لكافة مناطق النجف والكوفة`;

  window.location.href = `https://wa.me/${phone}?text=${orderText}`;
}

renderMenu();
updateTotal();
</script>

</body>
</html>
